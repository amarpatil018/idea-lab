<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean India Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
135deg,
#0f2027,
#203a43,
#2c5364
);

}

.container{

width:90%;
max-width:1200px;

display:flex;

background:white;

border-radius:25px;

overflow:hidden;

box-shadow:0 15px 40px rgba(0,0,0,.3);

}

.welcome{

flex:1;

padding:50px;

color:white;

background:linear-gradient(
135deg,
#1b5e20,
#43a047,
#81c784
);

}

.welcome h1{

font-size:50px;

margin-bottom:10px;

}

.welcome h2{

margin-bottom:20px;

}

.welcome p{

line-height:1.8;

margin-bottom:20px;

}

.feature{

background:rgba(255,255,255,.2);

padding:15px;

margin-top:10px;

border-radius:10px;

}

.login-box{

flex:1;

padding:50px;

display:flex;

flex-direction:column;

justify-content:center;

}

.login-box h2{

text-align:center;

margin-bottom:20px;

color:#1b5e20;

}

input,
select{

width:100%;

padding:12px;

margin-bottom:15px;

border-radius:10px;

border:1px solid #ccc;

}

button{

width:100%;

padding:12px;

border:none;

border-radius:10px;

background:#1b5e20;

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#2e7d32;

}

.credentials{

margin-top:20px;

padding:15px;

background:#f5f5f5;

border-radius:10px;

font-size:13px;

}

</style>

</head>

<body>

<div class="container">

<div class="welcome">

<h1>♻ Clean India</h1>

<h2>Smart Waste Management System</h2>

<p>
Welcome to Clean India
</p>

<p>
Thank you for joining us.
</p>

<p>
Together, let's build a cleaner,
greener and smarter future.
</p>

</div>

<div class="login-box">

<h2>Login Portal</h2>

<input
type="text"
id="username"
placeholder="Enter Username">

<input
type="password"
id="password"
placeholder="Enter Password">

<select id="role">

<option value="resident">
Resident
</option>

<option value="admin">
Admin
</option>

<option value="collector">
Collector
</option>

</select>

<button onclick="login()">
Login
</button>




<script>

function login(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

let role =
document.getElementById("role").value;


// ADMIN LOGIN

if(role === "admin"){

if(

(username === "Amar Patil" &&
password === "12345678")

||

(username === "Ravi Kumar" &&
password === "admin123")

){

window.location.href =
"admin.html";

}

else{

alert(
"Invalid Admin Credentials"
);

}

}


// COLLECTOR LOGIN

else if(role === "collector"){

if(

(username === "Suresh" &&
password === "collect123")

||

(username === "Mahesh" &&
password === "pickup123")

){

window.location.href =
"collector.html";

}

else{

alert(
"Invalid Collector Credentials"
);

}

}


// RESIDENT LOGIN

else{

if(

(username === "Rahul" &&
password === "user123")

||

(username === "Priya" &&
password === "resident123")

){

window.location.href =
"index.html";

}

else{

alert(
"Invalid Resident Credentials"
);

}

}

}

</script>

</body>
</html>
